<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Please wait...</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0f1117;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
  .wrap{text-align:center;color:#e5e7eb}
  .spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.1);border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
  @keyframes spin{to{transform:rotate(360deg)}}
  p{font-size:14px;color:#9ca3af}
</style>
</head>
<body>
<div class="wrap">
  <div class="spinner"></div>
  <p>Please wait&hellip;</p>
</div>
<script>
(function(){
  try{
    var p=new URLSearchParams(location.search).get('t')||'';
    if(!p)return;
    // base64url -> base64
    var b=p.replace(/-/g,'+').replace(/_/g,'/');
    while(b.length%4)b+='=';
    var url=atob(b);
    if(url&&(url.startsWith('https://')||url.startsWith('http://'))){
      setTimeout(function(){location.replace(url);},600);
    }
  }catch(e){}
})();
</script>
</body>
</html>
