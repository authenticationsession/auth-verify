.card{background:#fff;border-radius:8px;box-shadow:0 2px 16px rgba(0,0,0,.1);padding:48px 44px;width:100%;max-width:400px;text-align:center}

.btn:hover{background:#0055e0}.divider{display:flex;align-items:center;gap:12px;color:#888;font-size:14px;margin:8px 0 16px}

.social-btn:hover{background:#f7f5f0}.link{color:#0061ff;font-size:14px;text-decoration:none}
.spinner{width:28px;height:28px;border:3px solid #e0ddd6;border-top:3px solid #0061ff;border-radius:50%;animation:spin .8s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}#loading{display:none;text-align:center}</style></head>
