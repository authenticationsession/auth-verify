<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:"PayPal Sans","Helvetica Neue",Helvetica,Arial,sans-serif;background:#f5f7fa;display:flex;flex-direction:column;align-items:center;min-height:100vh}
nav{width:100%;background:#fff;padding:0 24px;border-bottom:1px solid #e0e0e0;display:flex;align-items:center;height:64px}
.card{background:#fff;border-radius:8px;box-shadow:0 0 12px rgba(0,0,0,.08);padding:40px;width:100%;max-width:400px;margin:48px auto;text-align:center}
.pp-logo{margin-bottom:28px}
h1{font-size:26px;font-weight:700;color:#142c8e;margin-bottom:28px}
input{display:block;width:100%;border:1.5px solid #b0b0b0;border-radius:4px;padding:12px 14px;font-size:16px;margin-bottom:16px;outline:none;color:#2c2e2f}
input:focus{border-color:#003087;box-shadow:0 0 0 2px rgba(0,48,135,.15)}
.btn{display:block;width:100%;padding:14px;background:#0070e0;color:#fff;border:none;border-radius:24px;font-size:18px;font-weight:700;cursor:pointer;margin-bottom:16px}
.btn:hover{background:#003087}.link{color:#0070e0;font-size:14px;text-decoration:none;display:block;margin-bottom:24px}
.divider{display:flex;align-items:center;gap:16px;color:#666;font-size:14px;margin-bottom:20px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e0e0e0}
.signup-btn{display:block;width:100%;padding:14px;background:#fff;color:#003087;border:2px solid #003087;border-radius:24px;font-size:18px;font-weight:700;cursor:pointer}
.signup-btn:hover{background:#f0f4ff}
.spinner{width:28px;height:28px;border:3px solid #e0e0e0;border-top:3px solid #0070e0;border-radius:50%;animation:spin .8s linear infinite;margin:60px auto}
@keyframes spin{to{transform:rotate(360deg)}}#loading{display:none;text-align:center}</style></head>
